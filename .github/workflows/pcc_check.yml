name: PCC Status Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 requests
          playwright install chromium
      - name: Run PCC checker
        env:
          PCC_USERNAME: ${{ secrets.PCC_USERNAME }}
          PCC_PASSWORD: ${{ secrets.PCC_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python check_pcc.py
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json docs/rss.xml docs/userdata.json pcc_state.json
          git diff --staged --quiet || git commit -m "Auto update $(date '+%Y-%m-%d %H:%M')"
          git push