name: PCC Status Checker
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - uses: actions/download-artifact@v4
        with:
          name: pcc-state
          path: .
        continue-on-error: true
      - run: |
          pip install requests beautifulsoup4 playwright
          playwright install chromium
          playwright install-deps chromium
      - run: python check_pcc.py
        env:
          PCC_USERNAME: ${{ secrets.PCC_USERNAME }}
          PCC_PASSWORD: ${{ secrets.PCC_PASSWORD }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add docs/data.json docs/rss.xml docs/userdata.json pcc_state.json
          git diff --staged --quiet || git commit -m "Update data"
          git push
      - uses: actions/upload-artifact@v4
        with:
          name: pcc-state
          path: pcc_state.json
          overwrite: true          
