<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCC Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a1628; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; padding: 16px; overflow-x: hidden; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  h1 { font-size: 18px; color: #60a5fa; }
  .counts-wrap { display: flex; align-items: center; gap: 4px; }
  .reset-btn { width: 16px; height: 16px; border-radius: 50%; background: #0f1f3d; border: 1px solid #1e3a5f; color: #334155; font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; opacity: 0.4; }
  .reset-btn.confirm { background: #7f1d1d; border-color: #ef4444; color: #ef4444; opacity: 1; }
  .counts { text-align: right; font-size: 11px; line-height: 1.8; }
  .counts .urgent { color: #ef4444; font-weight: 700; cursor: pointer; }
  .counts .important { color: #f59e0b; font-weight: 700; cursor: pointer; }
  .updated { font-size: 12px; color: #475569; margin-bottom: 16px; }

  /* Modal */
  .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal.open { display: flex; }
  .modal-box { background: #0f1f3d; border: 1px solid #1e3a5f; border-radius: 16px; padding: 20px; width: 90%; max-width: 360px; max-height: 80vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .modal-close { background: none; border: none; color: #64748b; font-size: 20px; cursor: pointer; }
  .modal-adj { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .adj-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .adj-num { font-size: 22px; font-weight: 700; min-width: 40px; text-align: center; }
  .modal-list { font-size: 12px; color: #64748b; line-height: 2; border-top: 1px solid #1e3a5f; padding-top: 10px; }
  .modal-list-item { color: #94a3b8; }

  .card-wrap { position: relative; margin-bottom: 10px; border-radius: 12px; overflow: hidden; }
  .swipe-hint { position: absolute; top: 0; bottom: 0; width: 100%; display: flex; align-items: center; border-radius: 12px; pointer-events: none; opacity: 0; transition: opacity 0.1s; }
  .swipe-hint.left-hint { background: #14532d; justify-content: flex-end; padding-right: 24px; color: #34d399; font-size: 13px; font-weight: 700; }
  .swipe-hint.right-hint { background: #3b0a0a; justify-content: flex-start; padding-left: 24px; color: #ef4444; font-size: 13px; font-weight: 700; }
  .card { background: #0f1f3d; border: 1px solid #1e3a5f; border-radius: 12px; padding: 14px; position: relative; transition: transform 0.15s ease; user-select: none; }
  .card.star1 { border-color: #f59e0b; }
  .card.star2 { border-color: #ef4444; border-width: 2px; }
  .card.delivered { opacity: 0.4; border-color: #334155; }
  .name { font-weight: 700; font-size: 15px; color: #f1f5f9; margin-bottom: 6px; padding-right: 50px; }
  .info { font-size: 12px; color: #64748b; margin-bottom: 2px; }
  .day-count { color: #60a5fa; font-size: 11px; font-weight: 600; }
  .bottom-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .s1,.s2 { background: #1e3a5f; color: #60a5fa; }
  .s3,.s4,.s5 { background: #1e3a5f; color: #f59e0b; }
  .s6,.s7 { background: #1e3a5f; color: #a78bfa; }
  .s8,.s9 { background: #1e3a5f; color: #34d399; }
  .deu-text { color: #ef4444; font-size: 13px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: #3b0a0a; cursor: pointer; flex-shrink: 0; }
  .deu-input { background: none; border: none; border-bottom: 1px solid #ef4444; color: #ef4444; font-size: 13px; font-weight: 700; width: 60px; outline: none; text-align: center; flex-shrink: 0; }
  .phone-link { font-size: 12px; color: #38bdf8; text-decoration: none; margin-left: auto; flex-shrink: 0; }
  .star-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; cursor: pointer; font-size: 20px; opacity: 0.4; }
  .star-btn:hover, .card.star1 .star-btn, .card.star2 .star-btn { opacity: 1; }
  .section-title { font-size: 12px; color: #475569; margin: 12px 0 8px; text-transform: uppercase; letter-spacing: 1px; }
  .loading { text-align: center; padding: 40px; color: #475569; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🛡️ PCC Tracker</h1>
    <div class="updated" id="updated">লোড হচ্ছে...</div>
  </div>
  <div class="counts-wrap">
    <button class="reset-btn" id="reset-btn" onclick="resetCounts()">R</button>
    <div class="counts">
      <div class="urgent" onclick="openModal('urgent')">Urgent: <span id="cnt-urgent">00</span></div>
      <div class="important" onclick="openModal('important')">Important: <span id="cnt-important">00</span></div>
    </div>
  </div>
</div>

<div id="list"><div class="loading">⏳ লোড হচ্ছে...</div></div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-box">
    <div class="modal-title">
      <span id="modal-title-text"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-adj">
      <button class="adj-btn" onclick="adjustCount(-1)">−</button>
      <div class="adj-num" id="modal-count">0</div>
      <button class="adj-btn" onclick="adjustCount(1)">+</button>
    </div>
    <div class="modal-list" id="modal-list"></div>
  </div>
</div>

<script>
let allApps = [];
let stars = JSON.parse(localStorage.getItem('pcc_stars') || '{}');
let delivered = JSON.parse(localStorage.getItem('pcc_delivered') || '{}');
let codes = JSON.parse(localStorage.getItem('pcc_codes') || '{}');
let showDeu = JSON.parse(localStorage.getItem('pcc_showdeu') || '{}');
let editingDeu = {};
let counts = JSON.parse(localStorage.getItem('pcc_counts') || '{"urgent":0,"important":0}');
let history = JSON.parse(localStorage.getItem('pcc_history') || '{"urgent":[],"important":[]}');
let resetConfirm = false, resetTimer = null;
let modalType = null;

function save() {
  localStorage.setItem('pcc_stars', JSON.stringify(stars));
  localStorage.setItem('pcc_delivered', JSON.stringify(delivered));
  localStorage.setItem('pcc_codes', JSON.stringify(codes));
  localStorage.setItem('pcc_showdeu', JSON.stringify(showDeu));
  localStorage.setItem('pcc_counts', JSON.stringify(counts));
  localStorage.setItem('pcc_history', JSON.stringify(history));
}

function daysSince(dateStr) {
  try {
    const months = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
    const parts = dateStr.toUpperCase().split('-');
    if (parts.length !== 3) return null;
    const day = parseInt(parts[0]);
    const mon = months[parts[1]];
    const yr = 2000 + parseInt(parts[2]);
    if (isNaN(day) || mon === undefined || isNaN(yr)) return null;
    const applyDate = new Date(yr, mon, day);
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.floor((today - applyDate) / 86400000);
    return diff > 0 ? diff : null;
  } catch { return null; }
}

function toggleStar(ref) {
  const prev = stars[ref] || 0;
  stars[ref] = (prev + 1) % 3;
  const next = stars[ref];
  const app = allApps.find(a => a.ref === ref);
  const entry = app ? `${app.name} ${ref}` : ref;

  // উপরে উঠলে count বাড়াও, নিচে নামলে কমাও
  if (prev === 0 && next === 1) {
    counts.important++;
    if (!history.important.includes(entry)) history.important.push(entry);
  } else if (prev === 1 && next === 2) {
    counts.important = Math.max(0, counts.important - 1);
    history.important = history.important.filter(e => e !== entry);
    counts.urgent++;
    if (!history.urgent.includes(entry)) history.urgent.push(entry);
  } else if (prev === 2 && next === 0) {
    counts.urgent = Math.max(0, counts.urgent - 1);
    history.urgent = history.urgent.filter(e => e !== entry);
  }

  save(); render();
}

function startEditDeu(ref) {
  editingDeu[ref] = true;
  render();
  setTimeout(() => { const inp = document.getElementById('deu-input-' + ref); if (inp) inp.focus(); }, 50);
}

function updateCode(ref, val) {
  codes[ref] = val; editingDeu[ref] = false; save(); render();
}

// Long press to share
let pressTimer = {};
function pressStart(ref) {
  pressTimer[ref] = setTimeout(() => {
    const app = allApps.find(a => a.ref === ref);
    if (!app) return;
    const text = `${app.name} ${ref}`;
    if (navigator.share) {
      navigator.share({ text });
    } else {
      navigator.clipboard.writeText(text).then(() => alert('কপি হয়েছে: ' + text));
    }
  }, 600);
}
function pressEnd(ref) { clearTimeout(pressTimer[ref]); }

function openModal(type) {
  modalType = type;
  document.getElementById('modal-title-text').textContent = type === 'urgent' ? '🔴 Urgent' : '⭐ Important';
  document.getElementById('modal-count').textContent = counts[type];
  const list = history[type];
  document.getElementById('modal-list').innerHTML = list.length
    ? list.map(e => `<div class="modal-list-item">• ${e}</div>`).join('')
    : '<div style="color:#475569">কোনো রেকর্ড নেই</div>';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  modalType = null;
}

function adjustCount(delta) {
  if (!modalType) return;
  counts[modalType] = Math.max(0, counts[modalType] + delta);
  document.getElementById('modal-count').textContent = counts[modalType];
  document.getElementById('cnt-' + modalType).textContent = String(counts[modalType]).padStart(2,'0');
  save();
}

function resetCounts() {
  if (!resetConfirm) {
    resetConfirm = true;
    document.getElementById('reset-btn').classList.add('confirm');
    resetTimer = setTimeout(() => {
      resetConfirm = false;
      document.getElementById('reset-btn').classList.remove('confirm');
    }, 3000);
  } else {
    clearTimeout(resetTimer);
    resetConfirm = false;
    counts = {urgent: 0, important: 0};
    history = {urgent: [], important: []};
    save(); render();
    document.getElementById('reset-btn').classList.remove('confirm');
  }
}

function cardHTML(app) {
  const s = stars[app.ref] || 0;
  const isDelivered = delivered[app.ref] || false;
  const starIcon = s === 2 ? '🔴' : s === 1 ? '⭐' : '☆';
  const cls = isDelivered ? 'delivered' : s === 2 ? 'star2' : s === 1 ? 'star1' : '';
  const num = parseInt((app.status || '').split('/')[0]) || 0;
  const scls = 's' + Math.min(num, 10);
  const showPhone = s > 0 && app.phone;
  const hasDeu = !isDelivered && showDeu[app.ref];
  const deuVal = codes[app.ref] || '';
  const isEditing = editingDeu[app.ref];
  const days = (!isDelivered && s > 0) ? daysSince(app.apply_date) : null;

  let deuHTML = '';
  if (hasDeu) {
    if (isEditing || !deuVal) {
      deuHTML = `<input id="deu-input-${app.ref}" class="deu-input" type="text" maxlength="6"
        placeholder="Deu" value="${deuVal}"
        onblur="updateCode('${app.ref}', this.value)"
        onkeydown="if(event.key==='Enter') this.blur()"
        onclick="event.stopPropagation()">`;
    } else {
      deuHTML = `<span class="deu-text" onclick="startEditDeu('${app.ref}');event.stopPropagation()">${deuVal}</span>`;
    }
  }

  return `
    <div class="card-wrap" id="wrap-${app.ref}">
      <div class="swipe-hint left-hint" id="hint-left-${app.ref}">Delivered</div>
      <div class="swipe-hint right-hint" id="hint-right-${app.ref}">Deu</div>
      <div class="card ${cls}" id="card-${app.ref}"
        data-ref="${app.ref}"
        ontouchstart="swipeStart(event,'${app.ref}');pressStart('${app.ref}')"
        ontouchmove="swipeMove(event,'${app.ref}');pressEnd('${app.ref}')"
        ontouchend="swipeEnd(event,'${app.ref}');pressEnd('${app.ref}')"
        ontouchcancel="pressEnd('${app.ref}')">
        <button class="star-btn" onclick="toggleStar('${app.ref}')">${starIcon}</button>
        <div class="name">${app.name}</div>
        <div class="info">
          📄 ${app.ref} &nbsp;|&nbsp; 📅 ${app.apply_date}
          ${days ? `&nbsp;<span class="day-count">Day:${String(days).padStart(2,'0')}</span>` : ''}
        </div>
        <div class="bottom-row">
          <span class="status ${scls}">${app.status}</span>
          ${deuHTML}
          ${showPhone ? `<a class="phone-link" href="tel:${app.phone}">📞 ${app.phone}</a>` : ''}
        </div>
      </div>
    </div>`;
}

let touchStartX = {}, touchStartY = {}, touching = {};

function swipeStart(e, ref) {
  touchStartX[ref] = e.touches[0].clientX;
  touchStartY[ref] = e.touches[0].clientY;
  touching[ref] = true;
}

function swipeMove(e, ref) {
  if (!touching[ref]) return;
  const dx = e.touches[0].clientX - touchStartX[ref];
  const dy = e.touches[0].clientY - touchStartY[ref];
  if (Math.abs(dx) < Math.abs(dy)) return;
  e.preventDefault();
  const card = document.getElementById('card-' + ref);
  if (!card) return;
  card.style.transition = 'none';
  card.style.transform = `translateX(${dx}px)`;
  const hl = document.getElementById('hint-left-' + ref);
  const hr = document.getElementById('hint-right-' + ref);
  if (dx < -30 && hl) hl.style.opacity = Math.min(1, Math.abs(dx)/80);
  else if (hl) hl.style.opacity = 0;
  if (dx > 30 && hr) hr.style.opacity = Math.min(1, dx/80);
  else if (hr) hr.style.opacity = 0;
}

function swipeEnd(e, ref) {
  if (!touching[ref]) return;
  touching[ref] = false;
  const dx = e.changedTouches[0].clientX - touchStartX[ref];
  const card = document.getElementById('card-' + ref);
  const hl = document.getElementById('hint-left-' + ref);
  const hr = document.getElementById('hint-right-' + ref);
  if (card) { card.style.transition = 'transform 0.2s ease'; card.style.transform = ''; }
  if (hl) hl.style.opacity = 0;
  if (hr) hr.style.opacity = 0;

  if (dx < -80) {
    delivered[ref] = !delivered[ref];
    if (delivered[ref]) showDeu[ref] = false;
    save(); render();
  } else if (dx > 80) {
    if (!delivered[ref]) {
      showDeu[ref] = !showDeu[ref];
      if (showDeu[ref]) editingDeu[ref] = true;
      save(); render();
      if (showDeu[ref]) setTimeout(() => { const inp = document.getElementById('deu-input-' + ref); if (inp) inp.focus(); }, 50);
    }
  }
}

function render() {
  const star2 = allApps.filter(a => !delivered[a.ref] && (stars[a.ref]||0)===2);
  const star1 = allApps.filter(a => !delivered[a.ref] && (stars[a.ref]||0)===1);
  const normal = allApps.filter(a => !delivered[a.ref] && (stars[a.ref]||0)===0);
  const done = allApps.filter(a => delivered[a.ref]);

  let html = '';
  if (star2.length) { html += '<div class="section-title">🔴 জরুরি</div>'; star2.forEach(a => html += cardHTML(a)); }
  if (star1.length) { html += '<div class="section-title">⭐ গুরুত্বপূর্ণ</div>'; star1.forEach(a => html += cardHTML(a)); }
  if (normal.length) { if (star1.length||star2.length) html += '<div class="section-title">সাধারণ</div>'; normal.forEach(a => html += cardHTML(a)); }
  if (done.length) { html += '<div class="section-title">✓ Delivered</div>'; done.forEach(a => html += cardHTML(a)); }

  document.getElementById('list').innerHTML = html;
  document.getElementById('cnt-urgent').textContent = String(counts.urgent).padStart(2,'0');
  document.getElementById('cnt-important').textContent = String(counts.important).padStart(2,'0');
}

async function load() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    const d = await r.json();
    document.getElementById('updated').textContent = 'আপডেট: ' + d.updated;
    allApps = d.applications;
    render();
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="loading">❌ লোড হয়নি</div>';
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
