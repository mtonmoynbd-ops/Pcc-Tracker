<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCC Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a1628; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; padding: 16px; overflow-x: hidden; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .shield-btn { width: 28px; height: 28px; border-radius: 50%; background: #1e3a5f; border: 1px solid #2563eb; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; flex-shrink: 0; }
  .title-block { display: flex; flex-direction: column; }
  h1 { font-size: 18px; color: #60a5fa; line-height: 1.2; }
  .updated { font-size: 11px; color: #475569; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .backup-dot { display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: #475569; margin-left: 3px; vertical-align: middle; }
  .backup-dot.ok { background: #34d399; }
  .backup-dot.err { background: #ef4444; }
  .web-btn { width: 28px; height: 28px; border-radius: 50%; background: #1e3a5f; border: 1px solid #2563eb; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; text-decoration: none; }
  .counts-wrap { display: flex; align-items: flex-start; gap: 6px; flex-shrink: 0; }
  .reset-btn { width: 14px; height: 14px; border-radius: 50%; background: #0f1f3d; border: 1px solid #1e3a5f; color: #334155; font-size: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; opacity: 0.3; margin-top: 2px; }
  .reset-btn.confirm { background: #7f1d1d; border-color: #ef4444; color: #ef4444; opacity: 1; }
  .counts { text-align: right; font-size: 11px; line-height: 1.7; }
  .counts .urgent { color: #ef4444; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .counts .important { color: #f59e0b; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .search-bar { background: #0f1f3d; border: 1px solid #1e3a5f; border-radius: 8px; padding: 8px 12px; color: #e2e8f0; font-size: 13px; width: 100%; outline: none; margin-bottom: 8px; margin-top: 8px; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 6px; overflow-x: auto; padding-bottom: 2px; align-items: center; }
  .filter-btn { padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid #1e3a5f; background: #0f1f3d; color: #64748b; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .filter-btn.active { background: #1e3a5f; color: #60a5fa; border-color: #60a5fa; }
  @keyframes blink-draft { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .filter-btn.draft-blink { animation: blink-draft 1.2s ease-in-out infinite; border-color: #f59e0b; color: #f59e0b; }
  .icon-filter-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid #2563eb; background: #1e3a5f; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 0; }
  .icon-filter-btn.police { border-color: #a78bfa; background: #1e1a3a; margin-left: auto; }
  .icon-filter-btn.police.active { background: #2d1f5e; border-color: #8b5cf6; }

  /* Calendar */
  .cal-box { display: none; background: #0f1f3d; border: 1px solid #1e3a5f; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .cal-nav { background: #1e293b; border: 1px solid #334155; color: #94a3b8; border-radius: 6px; padding: 2px 10px; cursor: pointer; font-size: 14px; }
  .cal-title { font-size: 13px; font-weight: 700; color: #f1f5f9; }
  .cal-weekdays { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; text-align: center; font-size: 11px; color: #94a3b8; margin-bottom: 6px; font-weight: 600; }
  .cal-days { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; text-align: center; }
  .cal-day { padding: 2px; border-radius: 6px; font-size: 12px; font-weight: 600; color: #94a3b8; border: 1px solid transparent; min-height: 36px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 3px; }
  .cal-day.has-file { color: #e2e8f0; font-weight: 700; background: #1e3a5f; border-color: #2563eb; cursor: pointer; }
  .cal-day.today { background: #1d4ed8; color: #fff; font-weight: 700; }
  .cal-dots { display: flex; gap: 1px; justify-content: center; margin-top: 2px; flex-wrap: wrap; max-width: 32px; }
  .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
  .cal-dot.normal { background: #60a5fa; }
  .cal-dot.important { background: #f59e0b; }
  .cal-dot.urgent { background: #ef4444; }
  .cal-dot.today-dot { background: #fff; }

  /* Section */
  .section-row { display: flex; align-items: center; margin: 12px 0 8px; }
  .section-title { font-size: 12px; color: #475569; text-transform: uppercase; letter-spacing: 1px; }

  /* Modals */
  .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
  .modal.open { display: flex; }
  .modal-box { background: #0f1f3d; border: 1px solid #1e3a5f; border-radius: 16px; padding: 18px; width: 100%; max-width: 360px; max-height: 82vh; overflow-y: auto; }
  .modal-title { font-size: 15px; font-weight: 700; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
  .modal-close { background: none; border: none; color: #64748b; font-size: 20px; cursor: pointer; flex-shrink: 0; }
  .count-top { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
  .adj-btn { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: #e2e8f0; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .adj-num { font-size: 18px; font-weight: 700; min-width: 28px; text-align: center; flex-shrink: 0; }
  .modal-add-input { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 5px 8px; color: #e2e8f0; font-size: 12px; outline: none; min-width: 0; }
  .modal-add-btn { background: #1d4ed8; border: none; color: #fff; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .modal-copy-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 5px 8px; border-radius: 6px; cursor: pointer; font-size: 12px; flex-shrink: 0; }
  .modal-list { font-size: 12px; border-top: 1px solid #1e3a5f; padding-top: 8px; max-height: 200px; overflow-y: auto; }
  .modal-list-item { color: #94a3b8; display: flex; align-items: center; gap: 4px; padding: 5px 0; border-bottom: 1px solid #0f2040; }
  .modal-list-item span { flex: 1; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .m-order-btn { background: none; border: none; color: #475569; cursor: pointer; font-size: 12px; padding: 0 2px; flex-shrink: 0; }
  .modal-del-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 14px; padding: 0 2px; flex-shrink: 0; opacity: 0.6; }

  /* Date modal */
  .date-modal-item { padding: 8px 0; border-bottom: 1px solid #1e3a5f; display: flex; justify-content: space-between; align-items: center; }
  .date-modal-item .dm-left { flex: 1; }
  .date-modal-item .dm-name { font-weight: 600; color: #f1f5f9; font-size: 13px; }
  .date-modal-item .dm-info { font-size: 11px; color: #64748b; margin-top: 2px; }
  .dm-star { font-size: 13px; flex-shrink: 0; margin-left: 8px; }

  /* Print date picker */
  .print-edit-box { background: #1e293b; border-radius: 8px; padding: 12px; margin-bottom: 10px; border: 1px solid #2563eb; }
  .print-edit-label { font-size: 11px; color: #60a5fa; margin-bottom: 8px; font-weight: 600; }
  .print-date-picker { width: 100%; background: #0f1f3d; border: 1px solid #334155; border-radius: 6px; padding: 8px 10px; color: #e2e8f0; font-size: 14px; outline: none; }
  .print-date-save { background: #1d4ed8; border: none; color: #fff; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; margin-top: 10px; width: 100%; }

  /* Timeline */
  .timeline-item { padding: 8px 0; border-bottom: 1px solid #1e3a5f; display: flex; justify-content: space-between; align-items: center; }
  .timeline-status { font-size: 13px; font-weight: 700; }
  .timeline-date { font-size: 11px; color: #64748b; }

  /* Note modal */
  .note-modal-textarea { width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 10px 12px; color: #e2e8f0; font-size: 13px; outline: none; resize: none; margin-bottom: 10px; min-height: 80px; }
  .note-modal-save { background: #1d4ed8; border: none; color: #fff; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .note-modal-clear { background: none; border: 1px solid #334155; color: #64748b; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-left: 8px; }

  /* Police */
  .police-filter-list { display: flex; flex-wrap: wrap; gap: 8px; }
  .police-filter-pill { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; border: 1px solid #7c3aed; background: #1e1a3a; color: #c4b5fd; cursor: pointer; }
  .police-filter-pill.active { background: #4c1d95; color: #ede9fe; }
  .police-filter-all { border-color: #334155; background: #1e293b; color: #94a3b8; }
  .police-filter-all.active { background: #1e3a5f; color: #60a5fa; border-color: #2563eb; }
  .client-add-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .client-add-input { flex: 1; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; color: #e2e8f0; font-size: 13px; outline: none; }
  .client-add-btn { background: #7c3aed; border: none; color: #fff; padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .client-name-list { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
  .client-name-row { display: flex; justify-content: space-between; align-items: center; background: #1e293b; border-radius: 8px; padding: 10px 14px; }
  .client-name-row span { font-size: 13px; color: #c4b5fd; }
  .client-del-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 18px; }
  .pick-item { background: #1e293b; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #c4b5fd; cursor: pointer; border: 1px solid #334155; margin-bottom: 6px; }
  .pick-item.active-pick { background: #2d1f5e; border-color: #7c3aed; }
  .settings-info { font-size: 11px; color: #475569; margin-bottom: 12px; line-height: 1.6; }
  .settings-input { width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; color: #e2e8f0; font-size: 13px; outline: none; margin-bottom: 10px; }
  .settings-save-btn { background: #1d4ed8; border: none; color: #fff; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }

  /* Select bar */
  .select-bar { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #0f1f3d; border-top: 1px solid #1e3a5f; padding: 12px 16px; z-index: 50; flex-direction: row; align-items: center; justify-content: space-between; gap: 10px; }
  .select-bar.visible { display: flex; }
  .select-bar-info { font-size: 13px; color: #94a3b8; }
  .select-bar-info span { color: #60a5fa; font-weight: 700; }
  .sel-copy-btn { background: #1d4ed8; border: none; color: #fff; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600; }
  .sel-cancel-btn { background: #1e293b; border: 1px solid #334155; color: #94a3b8; padding: 8px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; }
  .client-name-bottom-btn { width: 100%; margin-top: 16px; margin-bottom: 20px; padding: 12px; background: #0f1f3d; border: 1px solid #334155; border-radius: 8px; color: #64748b; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

  /* Cards */
  .card-wrap { position: relative; margin-bottom: 10px; border-radius: 12px; overflow: hidden; }
  .card-wrap.selected .card { border-color: #2563eb !important; border-width: 2px !important; }
  .sel-check { display: none; position: absolute; bottom: 12px; left: 10px; background: #2563eb; color: #fff; width: 18px; height: 18px; border-radius: 50%; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; z-index: 10; }
  .card-wrap.selected .sel-check { display: flex; }
  .swipe-hint { position: absolute; top: 0; bottom: 0; width: 100%; display: flex; align-items: center; border-radius: 12px; pointer-events: none; opacity: 0; transition: opacity 0.1s; }
  .swipe-hint.left-hint { background: #14532d; justify-content: flex-end; padding-right: 24px; color: #34d399; font-size: 13px; font-weight: 700; }
  .swipe-hint.right-hint { background: #3b0a0a; justify-content: flex-start; padding-left: 24px; color: #ef4444; font-size: 13px; font-weight: 700; }
  .card { background: #0f1f3d; border: 1px solid #1e3a5f; border-radius: 12px; padding: 12px 14px; position: relative; transition: transform 0.15s ease, background 0.4s ease; user-select: none; }
  .card.star1 { border-color: #f59e0b; }
  .card.star2 { border-color: #ef4444; border-width: 2px; }
  .card.delivered { opacity: 0.4; border-color: #334155; }
  .card.collected-card { background: #071a10; }
  .card-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 5px; }
  .card-top-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .stage-btn { width: 18px; height: 18px; border-radius: 50%; background: rgba(255,255,255,0.03); border: 1px solid #1e3a5f; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.3s; color: #1e3a5f; font-size: 11px; line-height: 1; padding: 0; -webkit-tap-highlight-color: transparent; flex-shrink: 0; }
  .stage-btn.fwd { border-color: #a16207; color: #eab308; box-shadow: 0 0 6px rgba(234,179,8,0.55); background: rgba(120,53,15,0.25); }
  .stage-btn.col { border-color: #15803d; color: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.55); background: rgba(20,83,45,0.25); }
  .stage-btn.pressing { transform: scale(0.85); opacity: 0.6; }
  .star-btn { background: none; border: none; cursor: pointer; font-size: 13px; opacity: 0.4; line-height: 1; padding: 0; flex-shrink: 0; }
  .card.star1 .star-btn, .card.star2 .star-btn { opacity: 1; }
  .name { font-weight: 700; font-size: 15px; color: #f1f5f9; flex: 1; cursor: pointer; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding-right: 6px; }
  .info { font-size: 12px; color: #94a3b8; margin-bottom: 4px; display: flex; align-items: center; gap: 3px; white-space: nowrap; overflow: hidden; }
  .ref-icon { display: inline-block; vertical-align: middle; margin-right: 1px; flex-shrink: 0; }
  .cal-icon { display: inline-block; vertical-align: middle; flex-shrink: 0; }
  .date-link { cursor: pointer; text-decoration: underline; text-decoration-style: dotted; color: #94a3b8; font-size: 12px; white-space: nowrap; }
  .day-normal { color: #60a5fa; font-size: 12px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
  .day-warn-urgent { color: #ef4444; font-size: 12px; font-weight: 800; white-space: nowrap; flex-shrink: 0; }
  .day-warn-important { color: #f97316; font-size: 12px; font-weight: 800; white-space: nowrap; flex-shrink: 0; }
  .bottom-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 2px; }
  .status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: 700; flex-shrink: 0; cursor: pointer; }
  .s1,.s2 { background: #1e3a5f; color: #60a5fa; }
  .s3,.s4,.s5 { background: #1e3a5f; color: #f59e0b; }
  .s6,.s7 { background: #1e3a5f; color: #a78bfa; }
  .s8,.s9 { background: #1e3a5f; color: #34d399; }
  @keyframes blink-imp { 0%,100%{opacity:1;box-shadow:0 0 0 rgba(251,191,36,0)} 50%{opacity:0.1;box-shadow:0 0 10px rgba(251,191,36,0.7)} }
  .status-blink { animation: blink-imp 0.9s ease-in-out infinite; }
  .deu-text { color: #ef4444; font-size: 13px; font-weight: 700; padding: 2px 8px; border-radius: 4px; background: #3b0a0a; cursor: pointer; flex-shrink: 0; }
  .deu-input { background: none; border: none; border-bottom: 1px solid #ef4444; color: #ef4444; font-size: 13px; font-weight: 700; width: 60px; outline: none; text-align: center; flex-shrink: 0; }
  .print-badge { color: #94a3b8; font-size: 11px; cursor: pointer; padding: 2px 8px; border: 1px solid #334155; border-radius: 4px; background: #1e293b; flex-shrink: 0; white-space: nowrap; }
  .police-tag-badge { color: #c4b5fd; font-size: 11px; padding: 2px 8px; border: 1px solid #4c1d95; border-radius: 4px; background: #1e1a3a; cursor: pointer; flex-shrink: 0; }
  .police-tag-btn { color: #7c3aed; font-size: 13px; cursor: pointer; flex-shrink: 0; opacity: 0.5; }
  .note-preview { font-size: 12px; color: #94a3b8; margin-top: 4px; cursor: pointer; }
  .phone-link { font-size: 12px; color: #38bdf8; text-decoration: none; margin-left: auto; flex-shrink: 0; }

  /* Expand toggle — thin invisible line at bottom of normal cards */
  .expand-toggle { width: 40%; margin: 8px auto 0; height: 2px; border-radius: 2px; background: #1e293b; cursor: pointer; transition: background 0.25s ease; display: block; border: none; }
  .expand-toggle.open { background: rgba(96,165,250,0.35); }

  .loading { text-align: center; padding: 40px; color: #475569; }
  #toast { position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
</style>
</head>
<body>

<svg style="display:none">
  <symbol id="ico-cal" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
  </symbol>
</svg>

<div class="header">
  <div class="header-left">
    <button class="shield-btn" onclick="openSettings()">🛡️</button>
    <div class="title-block">
      <h1>PCC Tracker</h1>
      <div class="updated" id="updated">লোড হচ্ছে...<span class="backup-dot" id="backup-dot"></span></div>
    </div>
    <a class="web-btn" href="https://pcc.police.gov.bd/ords/r/pcc/pcc/login_desktop" target="_blank" rel="external noopener">🌐</a>
  </div>
  <div class="counts-wrap">
    <button class="reset-btn" id="reset-btn" onclick="resetCounts()">R</button>
    <div class="counts">
      <div class="urgent" onclick="openModal('urgent')">Urgent: <span id="cnt-urgent">00</span></div>
      <div class="important" onclick="openModal('important')">Important: <span id="cnt-important">00</span></div>
    </div>
  </div>
</div>

<input class="search-bar" type="text" placeholder="🔍 নাম বা Ref খুঁজুন..." oninput="render()">

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all',this)">সব</button>
  <button class="filter-btn" onclick="setFilter('1-3',this)">1-3</button>
  <button class="filter-btn" onclick="setFilter('4-6',this)">4-6</button>
  <button class="filter-btn" onclick="setFilter('7-9',this)">7-9</button>
  <button class="filter-btn" id="draft-btn" onclick="setFilter('draft',this)">Draft</button>
  <button class="icon-filter-btn police" id="police-filter-btn" onclick="openPoliceFilterModal()">
    <span style="font-size:13px">🏷️</span>
  </button>
  <button class="icon-filter-btn" onclick="toggleCal()">
    <svg width="16" height="16"><use href="#ico-cal" stroke="#60a5fa"/></svg>
  </button>
</div>

<div class="cal-box" id="cal-box">
  <div class="cal-header">
    <button class="cal-nav" onclick="calNav(-1)">‹</button>
    <span class="cal-title" id="cal-title"></span>
    <button class="cal-nav" onclick="calNav(1)">›</button>
  </div>
  <div class="cal-weekdays">
    <div>রবি</div><div>সোম</div><div>মঙ্গল</div><div>বুধ</div><div>বৃহ</div><div>শুক্র</div><div>শনি</div>
  </div>
  <div class="cal-days" id="cal-days"></div>
</div>

<div id="list"><div class="loading">⏳ লোড হচ্ছে...</div></div>
<button class="client-name-bottom-btn" onclick="openClientModal()">🏷️ Client's Name</button>
<div id="toast"></div>

<div class="select-bar" id="select-bar">
  <div class="select-bar-info"><span id="sel-count">0</span>টি ফাইল নির্বাচিত</div>

<script>
const refSVG=`<svg class="ref-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
const calSVG=`<svg class="cal-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`;
const printSVG=`<svg class="cal-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>`;

const REPO_API='https://api.github.com/repos/mtonmoynbd-ops/pcc-tracker/contents/docs/userdata.json';
const MONTHS_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MONTHS_UP=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

let allApps=[],printDates={},statusHistory={};
let stars=JSON.parse(localStorage.getItem('pcc_stars')||'{}');
let delivered=JSON.parse(localStorage.getItem('pcc_delivered')||'{}');
let codes=JSON.parse(localStorage.getItem('pcc_codes')||'{}');
let showDeu=JSON.parse(localStorage.getItem('pcc_showdeu')||'{}');
let notes=JSON.parse(localStorage.getItem('pcc_notes')||'{}');
let blinkStopped=JSON.parse(localStorage.getItem('pcc_blink_stopped')||'{}');
let policeTags=JSON.parse(localStorage.getItem('pcc_police')||'{}');
let clientNames=JSON.parse(localStorage.getItem('pcc_client_names')||'[]');
let counts=JSON.parse(localStorage.getItem('pcc_counts')||'{"urgent":0,"important":0}');
let history=JSON.parse(localStorage.getItem('pcc_history')||'{"urgent":[],"important":[]}');
let forwarded=JSON.parse(localStorage.getItem('pcc_forwarded')||'{}');
let collected=JSON.parse(localStorage.getItem('pcc_collected')||'{}');
let collectedDay=JSON.parse(localStorage.getItem('pcc_collected_day')||'{}');
let manualPrintDates=JSON.parse(localStorage.getItem('pcc_manual_print_dates')||'{}');
let expandedNormal=new Set(JSON.parse(localStorage.getItem('pcc_expanded_normal')||'[]'));
let editingDeu={};
let resetConfirm=false,resetTimer=null;
let modalType=null,activeFilter='all',activePoliceFilter=null;
let selected=new Set(),selectMode=false;
let calDate=new Date(),backupTimer=null,pickRef=null;
let stageTimer={},noteModalRef=null;

// ── Date helpers ──────────────────────────────────────────
function toInputDate(str){
  try{
    if(!str)return '';
    const p=str.toUpperCase().split('-');
    if(p.length!==3)return '';
    const dd=String(parseInt(p[0])).padStart(2,'0');
    const mo=MONTHS_UP.indexOf(p[1].substring(0,3));
    if(mo<0)return '';
    let yr=parseInt(p[2]);
    if(yr<100)yr=2000+yr; // fix: 26→2026
    return `${yr}-${String(mo+1).padStart(2,'0')}-${dd}`;
  }catch{return '';}
}
function fromInputDate(str){
  try{
    if(!str)return '';
    const[y,mo,d]=str.split('-');
    return String(parseInt(d)).padStart(2,'0')+'-'+MONTHS_SHORT[parseInt(mo)-1]+'-'+String(y).slice(2);
  }catch{return '';}
}
function getEffectivePrintDate(ref){ return manualPrintDates[ref]||printDates[ref]||null; }

// ── Save ──────────────────────────────────────────────────
function saveLocal(){
  localStorage.setItem('pcc_stars',JSON.stringify(stars));
  localStorage.setItem('pcc_delivered',JSON.stringify(delivered));
  localStorage.setItem('pcc_codes',JSON.stringify(codes));
  localStorage.setItem('pcc_showdeu',JSON.stringify(showDeu));
  localStorage.setItem('pcc_notes',JSON.stringify(notes));
  localStorage.setItem('pcc_blink_stopped',JSON.stringify(blinkStopped));
  localStorage.setItem('pcc_police',JSON.stringify(policeTags));
  localStorage.setItem('pcc_client_names',JSON.stringify(clientNames));
  localStorage.setItem('pcc_counts',JSON.stringify(counts));
  localStorage.setItem('pcc_history',JSON.stringify(history));
  localStorage.setItem('pcc_forwarded',JSON.stringify(forwarded));
  localStorage.setItem('pcc_collected',JSON.stringify(collected));
  localStorage.setItem('pcc_collected_day',JSON.stringify(collectedDay));
  localStorage.setItem('pcc_manual_print_dates',JSON.stringify(manualPrintDates));
  localStorage.setItem('pcc_expanded_normal',JSON.stringify([...expandedNormal]));
}
function save(){ saveLocal(); scheduleBackup(); }

// ── Backup ────────────────────────────────────────────────
function scheduleBackup(){if(backupTimer)clearTimeout(backupTimer);backupTimer=setTimeout(doBackup,5000);}
async function doBackup(){
  const pat=localStorage.getItem('pcc_pat');if(!pat)return;
  setBkDot('...');
  try{
    const ud={stars,delivered,codes,showDeu,notes,blinkStopped,policeTags,clientNames,counts,history,forwarded,collected,collectedDay,manualPrintDates};
    const getR=await fetch(REPO_API,{headers:{'Authorization':`token ${pat}`,'Accept':'application/vnd.github.v3+json'}});
    let sha=null,existing={};
    if(getR.ok){const d=await getR.json();sha=d.sha;try{existing=JSON.parse(atob(d.content.replace(/\n/g,'')));}catch(e){}}
    const merged={...ud};
    if(existing.print_dates)merged.print_dates=existing.print_dates;
    if(existing.status_history)merged.status_history=existing.status_history;
    if(existing.script_updated)merged.script_updated=existing.script_updated;
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(merged))));
    const putR=await fetch(REPO_API,{method:'PUT',headers:{'Authorization':`token ${pat}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify({message:'Auto-backup',content,...(sha?{sha}:{})})});
    setBkDot(putR.ok?'ok':'err');
  }catch(e){setBkDot('err');}
}
function setBkDot(s){const el=document.getElementById('backup-dot');if(!el)return;el.className='backup-dot'+(s==='ok'?' ok':s==='err'?' err':'');}
async function syncFromCloud(){
  try{
    const r=await fetch('userdata.json?t='+Date.now());if(!r.ok)return;
    const d=await r.json();
    if(d.stars)stars=d.stars;if(d.delivered)delivered=d.delivered;if(d.codes)codes=d.codes;
    if(d.showDeu)showDeu=d.showDeu;if(d.notes)notes=d.notes;if(d.blinkStopped)blinkStopped=d.blinkStopped;
    if(d.policeTags)policeTags=d.policeTags;if(d.clientNames)clientNames=d.clientNames;
    if(d.counts)counts=d.counts;if(d.history)history=d.history;
    if(d.forwarded)forwarded=d.forwarded;if(d.collected)collected=d.collected;if(d.collectedDay)collectedDay=d.collectedDay;
    if(d.manualPrintDates)manualPrintDates=d.manualPrintDates;
    saveLocal();
  }catch(e){}
}

// ── Settings ──────────────────────────────────────────────
function openSettings(){document.getElementById('pat-input').value=localStorage.getItem('pcc_pat')||'';document.getElementById('settings-status').textContent='';document.getElementById('settings-modal').classList.add('open');}
function closeSettings(){document.getElementById('settings-modal').classList.remove('open');}
async function savePAT(){
  const pat=document.getElementById('pat-input').value.trim();
  if(pat)localStorage.setItem('pcc_pat',pat);else localStorage.removeItem('pcc_pat');
  document.getElementById('settings-status').textContent='Backup চলছে...';
  await doBackup();
  document.getElementById('settings-status').textContent=pat?'✅ Backup সম্পন্ন':'PAT মুছে ফেলা হয়েছে';
}

// ── Stage button ──────────────────────────────────────────
function stagePressStart(e,ref){
  e.stopPropagation();
  const btn=document.getElementById('sbtn-'+ref);
  if(btn)btn.classList.add('pressing');
  const isCol=collected[ref]||false,isFwd=forwarded[ref]||false;
  const stage=isCol?2:isFwd?1:0;
  stageTimer[ref]=setTimeout(()=>{
    if(btn)btn.classList.remove('pressing');
    if(stage===0){forwarded[ref]=true;collected[ref]=false;delete collectedDay[ref];save();render();showToast('↑ Forwarded');}
    else if(stage===1){const app=allApps.find(a=>a.ref===ref);collected[ref]=true;if(app)collectedDay[ref]=daysSince(app.apply_date,ref);save();render();showToast('↓ Collected');}
    else{forwarded[ref]=false;collected[ref]=false;delete collectedDay[ref];save();render();showToast('↺ Reset');}
  },stage===2?2000:600);
}
function stagePressEnd(ref){clearTimeout(stageTimer[ref]);const btn=document.getElementById('sbtn-'+ref);if(btn)btn.classList.remove('pressing');}

// ── Calendar ──────────────────────────────────────────────
function toggleCal(){const b=document.getElementById('cal-box');const h=b.style.display==='none'||b.style.display==='';b.style.display=h?'block':'none';if(h)renderCal();}
function calNav(dir){calDate.setMonth(calDate.getMonth()+dir);renderCal();}
function renderCal(){
  const mn=['জানুয়ারি','ফেব্রুয়ারি','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
  const sm=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const y=calDate.getFullYear(),m=calDate.getMonth();
  document.getElementById('cal-title').textContent=mn[m]+' '+y;
  const fd=new Date(y,m,1).getDay(),dim=new Date(y,m+1,0).getDate();
  const today=new Date();today.setHours(0,0,0,0);
  const dayDots={};
  allApps.forEach(a=>{
    if(!a.apply_date)return;
    const p=a.apply_date.toUpperCase().split('-');if(p.length!==3)return;
    const dd=parseInt(p[0]),mo=MONTHS_UP.indexOf(p[1]),yr=2000+parseInt(p[2]);
    if(mo>=0&&mo===m&&yr===y){if(!dayDots[dd])dayDots[dd]=[];const s=stars[a.ref]||0;dayDots[dd].push(s===2?'urgent':s===1?'important':'normal');}
  });
  let html='';
  for(let i=0;i<fd;i++)html+='<div class="cal-day"></div>';
  for(let d=1;d<=dim;d++){
    const isT=new Date(y,m,d).getTime()===today.getTime();
    const dots=dayDots[d]||[];const hasF=dots.length>0;
    const ds=String(d).padStart(2,'0')+'-'+sm[m]+'-'+String(y).slice(2);
    let cls='cal-day'+(isT?' today':hasF?' has-file':'');
    let dotsHTML='';
    if(hasF){
      const shown=dots.slice(0,5);
      const dotSpans=isT?shown.map(()=>`<span class="cal-dot today-dot"></span>`).join(''):shown.map(t=>`<span class="cal-dot ${t}"></span>`).join('');
      const plus=dots.length>5?`<span style="font-size:6px;color:#94a3b8;line-height:1">+</span>`:'';
      dotsHTML=`<div class="cal-dots">${dotSpans}${plus}</div>`;
    }
    html+=`<div class="${cls}" ${hasF?`onclick="calDayClick('${ds}')"`:''}>${d}${dotsHTML}</div>`;
  }
  document.getElementById('cal-days').innerHTML=html;
}
function calDayClick(ds){const same=allApps.filter(a=>a.apply_date===ds);if(!same.length)return;document.getElementById('cal-box').style.display='none';openDateModal(ds,'📅','apply_date',null);}

// ── Print Date Modal ──────────────────────────────────────
function openDateModal(dateStr,prefix,sourceField,editRef){
  const same=sourceField==='apply_date'
    ?allApps.filter(a=>a.apply_date===dateStr)
    :allApps.filter(a=>getEffectivePrintDate(a.ref)===dateStr);
  document.getElementById('date-modal-title').textContent=`${prefix} ${dateStr} — ${same.length}টি ফাইল`;

  const editEl=document.getElementById('date-modal-edit');
  if(sourceField==='print_date'){
    const inputVal=toInputDate(dateStr);
    editEl.innerHTML=`
      <div class="print-edit-box">
        <div class="print-edit-label">🖨️ তারিখ পরিবর্তন করুন</div>
        <input class="print-date-picker" type="date" id="print-picker" value="${inputVal}">
        <button class="print-date-save" onclick="savePrintDateFromPicker('${editRef||''}','${dateStr}')">✅ সংরক্ষণ করুন</button>
      </div>`;
  } else {
    editEl.innerHTML='';
  }

  const getStarIcon=s=>s===2?'🔴':s===1?'⭐':'';
  document.getElementById('date-modal-list').innerHTML=same.map(a=>{
    const n=parseInt((a.status||'').split('/')[0])||0;const sc='s'+Math.min(n,10);
    const txt=sourceField==='print_date'?'(Printed)':a.status;
    const st=sourceField==='print_date'?'color:#64748b':'';
    const s=stars[a.ref]||0;const si=getStarIcon(s);
    return `<div class="date-modal-item">
      <div class="dm-left">
        <div class="dm-name">${a.name}</div>
        <div class="dm-info">📄 ${a.ref} &nbsp;|&nbsp; <span class="status ${sc}" style="font-size:11px;padding:2px 8px;${st}">${txt}</span></div>
      </div>
      ${si?`<span class="dm-star">${si}</span>`:''}
    </div>`;
  }).join('');
  document.getElementById('date-modal').classList.add('open');
}
function savePrintDateFromPicker(editRef,fallbackDate){
  const picker=document.getElementById('print-picker');
  if(!picker||!picker.value){showToast('তারিখ সিলেক্ট করুন');return;}
  const newDate=fromInputDate(picker.value);
  if(!newDate){showToast('তারিখ সঠিক নয়');return;}
  if(editRef){manualPrintDates[editRef]=newDate;}
  else{allApps.forEach(a=>{if(getEffectivePrintDate(a.ref)===fallbackDate)manualPrintDates[a.ref]=newDate;});}
  save();closeDateModal();render();showToast('✅ '+newDate);
}
function closeDateModal(){document.getElementById('date-modal').classList.remove('open');}

// ── Timeline ──────────────────────────────────────────────
function openTimelineModal(ref){
  const app=allApps.find(a=>a.ref===ref);if(!app)return;
  const s=stars[ref]||0;const si=s===2?'🔴':s===1?'⭐':'';
  document.getElementById('timeline-modal-title').textContent=(si?si+' ':'')+app.name;
  const hist=statusHistory[ref]||[];
  const clr={'s1':'#60a5fa','s2':'#60a5fa','s3':'#f59e0b','s4':'#f59e0b','s5':'#f59e0b','s6':'#a78bfa','s7':'#a78bfa','s8':'#34d399','s9':'#34d399'};
  if(!hist.length){document.getElementById('timeline-list').innerHTML='<div style="color:#475569;font-size:12px;text-align:center;padding:12px">কোনো ইতিহাস নেই</div>';document.getElementById('timeline-modal').classList.add('open');return;}
  document.getElementById('timeline-list').innerHTML=hist.map(h=>{
    const n2=parseInt((h.status||'').split('/')[0])||0;const sc='s'+Math.min(n2,10);const color=clr[sc]||'#94a3b8';
    return `<div class="timeline-item"><div style="display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0"></div><span class="timeline-status" style="color:${color}">${h.status}</span></div><span class="timeline-date">${h.date}</span></div>`;
  }).join('');
  document.getElementById('timeline-modal').classList.add('open');
}
function closeTimelineModal(){document.getElementById('timeline-modal').classList.remove('open');}

// ── Card Note Modal ───────────────────────────────────────
function openNoteModal(ref){
  noteModalRef=ref;
  const app=allApps.find(a=>a.ref===ref);const s=stars[ref]||0;const si=s===2?'🔴':s===1?'⭐':'';
  document.getElementById('note-modal-title').textContent=(si?si+' ':'')+( app?app.name:ref)+' — নোট';
  document.getElementById('note-modal-textarea').value=notes[ref]||'';
  document.getElementById('note-modal').classList.add('open');
  setTimeout(()=>document.getElementById('note-modal-textarea').focus(),100);
}
function closeNoteModal(){document.getElementById('note-modal').classList.remove('open');noteModalRef=null;}
function saveNoteModal(){if(!noteModalRef)return;notes[noteModalRef]=document.getElementById('note-modal-textarea').value.trim();save();closeNoteModal();render();}

// ── Police ────────────────────────────────────────────────
function openPoliceFilterModal(){
  const list=document.getElementById('police-filter-list');
  let html=`<span class="police-filter-pill police-filter-all ${!activePoliceFilter?'active':''}" onclick="setPoliceFilter(null)">সব</span>`;
  clientNames.forEach(n=>{html+=`<span class="police-filter-pill ${activePoliceFilter===n?'active':''}" onclick="setPoliceFilter('${n}')">${n}</span>`;});
  if(!clientNames.length)html+='<div style="color:#475569;font-size:12px;margin-top:8px">নিচের Client\'s Name বাটনে নাম যোগ করুন</div>';
  list.innerHTML=html;document.getElementById('police-filter-modal').classList.add('open');
}
function closePoliceFilterModal(){document.getElementById('police-filter-modal').classList.remove('open');}
function setPoliceFilter(name){activePoliceFilter=name;document.getElementById('police-filter-btn').classList.toggle('active',!!name);closePoliceFilterModal();render();}
function openClientModal(){renderClientModal();document.getElementById('client-modal').classList.add('open');}
function closeClientModal(){document.getElementById('client-modal').classList.remove('open');}
function renderClientModal(){
  const list=document.getElementById('client-name-list');
  if(!clientNames.length){list.innerHTML='<div style="font-size:12px;color:#475569;text-align:center;padding:12px">কোনো নাম নেই</div>';return;}
  list.innerHTML=clientNames.map(n=>`<div class="client-name-row"><span>${n}</span><button class="client-del-btn" onclick="deleteClientName('${n}')">×</button></div>`).join('');
}
function addClientName(){const inp=document.getElementById('client-add-input');const name=inp.value.trim();if(!name||clientNames.includes(name))return;clientNames.push(name);inp.value='';save();renderClientModal();}
function deleteClientName(name){clientNames=clientNames.filter(n=>n!==name);Object.keys(policeTags).forEach(ref=>{if(policeTags[ref]===name)delete policeTags[ref];});if(activePoliceFilter===name){activePoliceFilter=null;document.getElementById('police-filter-btn').classList.remove('active');}save();renderClientModal();render();}
function openPickModal(ref){
  pickRef=ref;const list=document.getElementById('pick-list');
  if(!clientNames.length){list.innerHTML='<div class="pick-item" style="color:#475569">নিচের Client\'s Name বাটনে নাম যোগ করুন</div>';document.getElementById('pick-modal').classList.add('open');return;}
  let html=`<div class="pick-item" style="color:#475569;border-color:#1e293b" onclick="assignPoliceTag(null)">— ট্যাগ সরান</div>`;
  clientNames.forEach(n=>{const active=policeTags[ref]===n;html+=`<div class="pick-item ${active?'active-pick':''}" onclick="assignPoliceTag('${n}')">${active?'✓ ':''}${n}</div>`;});
  list.innerHTML=html;document.getElementById('pick-modal').classList.add('open');
}
function closePickModal(){document.getElementById('pick-modal').classList.remove('open');pickRef=null;}
function assignPoliceTag(name){if(!pickRef)return;if(name)policeTags[pickRef]=name;else delete policeTags[pickRef];save();closePickModal();render();}

// ── Count Modal ───────────────────────────────────────────
function openModal(type){
  modalType=type;
  document.getElementById('modal-title-text').textContent=type==='urgent'?'🔴 Urgent':'⭐ Important';
  document.getElementById('modal-count').textContent=counts[type];
  document.getElementById('modal-add-input').value='';
  renderModalList();document.getElementById('modal').classList.add('open');
}
function renderModalList(){
  if(!modalType)return;
  const list=history[modalType];
  if(!list.length){document.getElementById('modal-list').innerHTML='<div style="color:#475569;padding:8px 0;font-size:12px">কোনো রেকর্ড নেই</div>';return;}
  document.getElementById('modal-list').innerHTML=list.map((e,i)=>
    `<div class="modal-list-item">
      <button class="m-order-btn" onclick="moveEntry(${i},-1)" ${i===0?'style="opacity:0.2;pointer-events:none"':''}>▲</button>
      <button class="m-order-btn" onclick="moveEntry(${i},1)" ${i===list.length-1?'style="opacity:0.2;pointer-events:none"':''}>▼</button>
      <span title="${e}">• ${e}</span>
      <button class="modal-del-btn" onclick="removeModalEntry(${i})">×</button>
    </div>`
  ).join('');
}
function moveEntry(idx,dir){if(!modalType)return;const list=history[modalType];const ni=idx+dir;if(ni<0||ni>=list.length)return;[list[idx],list[ni]]=[list[ni],list[idx]];save();renderModalList();}
function addModalEntry(){if(!modalType)return;const inp=document.getElementById('modal-add-input');const val=inp.value.trim();if(!val)return;if(!history[modalType].includes(val)){history[modalType].push(val);counts[modalType]++;document.getElementById('modal-count').textContent=counts[modalType];document.getElementById('cnt-'+modalType).textContent=String(counts[modalType]).padStart(2,'0');save();renderModalList();}inp.value='';}
function removeModalEntry(idx){if(!modalType)return;history[modalType].splice(idx,1);counts[modalType]=Math.max(0,counts[modalType]-1);document.getElementById('modal-count').textContent=counts[modalType];document.getElementById('cnt-'+modalType).textContent=String(counts[modalType]).padStart(2,'0');save();renderModalList();}
function copyModalList(){if(!modalType)return;const list=history[modalType];if(!list.length){showToast('কোনো রেকর্ড নেই');return;}const text=list.join('\n');if(navigator.share)navigator.share({text});else navigator.clipboard.writeText(text).then(()=>showToast('✓ লিস্ট কপি হয়েছে'));}
function closeModal(){document.getElementById('modal').classList.remove('open');modalType=null;}
function adjustCount(delta){if(!modalType)return;counts[modalType]=Math.max(0,counts[modalType]+delta);document.getElementById('modal-count').textContent=counts[modalType];document.getElementById('cnt-'+modalType).textContent=String(counts[modalType]).padStart(2,'0');save();}
function resetCounts(){if(!resetConfirm){resetConfirm=true;document.getElementById('reset-btn').classList.add('confirm');resetTimer=setTimeout(()=>{resetConfirm=false;document.getElementById('reset-btn').classList.remove('confirm');},3000);}else{clearTimeout(resetTimer);resetConfirm=false;counts={urgent:0,important:0};history={urgent:[],important:[]};save();render();document.getElementById('reset-btn').classList.remove('confirm');}}

// ── Multi-select ──────────────────────────────────────────
function toggleSelect(ref){if(selected.has(ref))selected.delete(ref);else selected.add(ref);updateSelectBar();const w=document.getElementById('wrap-'+ref);if(w)w.classList.toggle('selected',selected.has(ref));}
function updateSelectBar(){const bar=document.getElementById('select-bar');if(selected.size>0){selectMode=true;bar.classList.add('visible');document.getElementById('sel-count').textContent=selected.size;}else{selectMode=false;bar.classList.remove('visible');}}
function clearSelection(){selected.forEach(r=>{const w=document.getElementById('wrap-'+r);if(w)w.classList.remove('selected');});selected.clear();selectMode=false;document.getElementById('select-bar').classList.remove('visible');}
function copySelected(){
  const lines=[];
  allApps.forEach(a=>{if(selected.has(a.ref)){lines.push(`${a.name} ${a.ref}`);const n=parseInt((a.status||'').split('/')[0])||0;if(n===2)blinkStopped[a.ref]=true;const s=stars[a.ref]||0;if(s>0&&!forwarded[a.ref])forwarded[a.ref]=true;}});
  save();const text=lines.join('\n');
  if(navigator.share)navigator.share({text});else navigator.clipboard.writeText(text).then(()=>showToast('✓ '+selected.size+'টি কপি')).catch(()=>showToast('✓ কপি হয়েছে'));
  clearSelection();render();
}

// ── Filter ────────────────────────────────────────────────
function setFilter(f,btn){activeFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}
function matchesFilter(app){
  const num=parseInt((app.status||'').split('/')[0])||0;
  const isDraft=(app.status||'').toLowerCase().includes('draft');
  if(activePoliceFilter&&policeTags[app.ref]!==activePoliceFilter)return false;
  if(activeFilter==='all')return true;
  if(activeFilter==='draft')return isDraft;
  if(activeFilter==='1-3')return !isDraft&&num>=1&&num<=3;
  if(activeFilter==='4-6')return !isDraft&&num>=4&&num<=6;
  if(activeFilter==='7-9')return !isDraft&&num>=7&&num<=9;
  return true;
}
function daysSince(ds,ref){
  if(collected[ref]&&collectedDay[ref]!==undefined)return collectedDay[ref];
  try{
    const p=ds.toUpperCase().split('-');if(p.length!==3)return null;
    const d=parseInt(p[0]),m=MONTHS_UP.indexOf(p[1]),y=2000+parseInt(p[2]);
    if(isNaN(d)||m<0||isNaN(y))return null;
    const aDate=new Date(y,m,d),today=new Date();today.setHours(0,0,0,0);
    const diff=Math.floor((today-aDate)/86400000);return diff>0?diff:null;
  }catch{return null;}
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2200);}
function toggleStar(ref){
  const prev=stars[ref]||0;stars[ref]=(prev+1)%3;const next=stars[ref];
  const app=allApps.find(a=>a.ref===ref);const entry=app?`${app.name} ${ref}`:ref;
  if(prev===0&&next===1){counts.important++;if(!history.important.includes(entry))history.important.push(entry);}
  else if(prev===1&&next===2){counts.important=Math.max(0,counts.important-1);history.important=history.important.filter(e=>e!==entry);counts.urgent++;if(!history.urgent.includes(entry))history.urgent.push(entry);}
  else if(prev===2&&next===0){counts.urgent=Math.max(0,counts.urgent-1);history.urgent=history.urgent.filter(e=>e!==entry);}
  save();render();
}
function startEditDeu(ref){editingDeu[ref]=true;render();setTimeout(()=>{const i=document.getElementById('deu-input-'+ref);if(i)i.focus();},50);}
function updateCode(ref,val){codes[ref]=val;editingDeu[ref]=false;save();render();}
function toggleExpandNormal(ref){if(expandedNormal.has(ref))expandedNormal.delete(ref);else expandedNormal.add(ref);saveLocal();render();}

// ── Card HTML ─────────────────────────────────────────────
function cardHTML(app){
  const s=stars[app.ref]||0;
  const isDelivered=delivered[app.ref]||false;
  const si=s===2?'🔴':s===1?'⭐':'☆';
  const cls=isDelivered?'delivered':s===2?'star2':s===1?'star1':'';
  const num=parseInt((app.status||'').split('/')[0])||0;
  const scls='s'+Math.min(num,10);
  const isExpanded=s===0&&expandedNormal.has(app.ref);
  const showDetails=s>0||isExpanded;
  const hasDeu=!isDelivered&&showDeu[app.ref];
  const deuVal=codes[app.ref]||'';
  const isEditing=editingDeu[app.ref];
  const days=(!isDelivered&&showDetails)?daysSince(app.apply_date,app.ref):null;
  const noteVal=notes[app.ref]||'';
  const isSelected=selected.has(app.ref);
  const shouldBlink=s===1&&!isDelivered&&num===2&&!blinkStopped[app.ref];
  const printDate=getEffectivePrintDate(app.ref);
  const policeTag=policeTags[app.ref]||'';
  const isFwd=forwarded[app.ref]||false;
  const isCol=collected[app.ref]||false;
  const stage=isCol?2:isFwd?1:0;
  const stageIcon=stage===0?'▴':stage===1?'▲':'▼';
  const stageCls=stage===0?'':stage===1?'fwd':'col';

  let dayClass='day-normal';
  if(days){if(s===2&&days>=5)dayClass='day-warn-urgent';else if(s===1&&days>=12)dayClass='day-warn-important';}

  const stageBtn=(s>0&&!isDelivered)?`<button class="stage-btn ${stageCls}" id="sbtn-${app.ref}" oncontextmenu="return false" ontouchstart="stagePressStart(event,'${app.ref}')" ontouchend="stagePressEnd('${app.ref}')" ontouchcancel="stagePressEnd('${app.ref}')" onclick="event.stopPropagation()">${stageIcon}</button>`:'';

  let deuHTML='';
  if(hasDeu){if(isEditing||!deuVal){deuHTML=`<input id="deu-input-${app.ref}" class="deu-input" type="text" maxlength="6" placeholder="Deu" value="${deuVal}" onblur="updateCode('${app.ref}',this.value)" onkeydown="if(event.key==='Enter')this.blur()" onclick="event.stopPropagation()">`;}else{deuHTML=`<span class="deu-text" onclick="startEditDeu('${app.ref}');event.stopPropagation()">${deuVal}</span>`;}}

  let policeHTML='';
  if(s===0&&!isDelivered){if(policeTag){policeHTML=`<span class="police-tag-badge" onclick="openPickModal('${app.ref}');event.stopPropagation()">🏷️ ${policeTag}</span>`;}else{policeHTML=`<span class="police-tag-btn" onclick="openPickModal('${app.ref}');event.stopPropagation()">🏷️</span>`;}}

  const showPrint=showDetails&&printDate&&!isDelivered;
  const printBadge=showPrint?`<span class="print-badge" onclick="openDateModal('${printDate}','📅','print_date','${app.ref}');event.stopPropagation()">${printSVG} ${printDate}</span>`:'';
  const notePreview=(s>0&&!isDelivered&&noteVal)?`<div class="note-preview" onclick="openNoteModal('${app.ref}');event.stopPropagation()">📝 ${noteVal}</div>`:'';
  const nameClick=`${s>0?`openNoteModal('${app.ref}');`:''}event.stopPropagation()`;
  const statusClick=showDetails?`openTimelineModal('${app.ref}');event.stopPropagation()`:'event.stopPropagation()';
  const daySpan=days?`<span class="${dayClass}">Day:${String(days).padStart(2,'0')}</span>`:'';
  const phoneHTML=(showDetails&&app.phone)?`<a class="phone-link" href="tel:${app.phone}" onclick="event.stopPropagation()">📞 ${app.phone}</a>`:'';

  // Expand toggle — thin invisible line at bottom, only normal cards
  const expandToggle=(s===0&&!isDelivered)?`<div class="expand-toggle ${isExpanded?'open':''}" onclick="toggleExpandNormal('${app.ref}');event.stopPropagation()"></div>`:'';

  return `
    <div class="card-wrap ${isSelected?'selected':''}" id="wrap-${app.ref}">
      <div class="swipe-hint left-hint" id="hint-left-${app.ref}">Delivered</div>
      <div class="swipe-hint right-hint" id="hint-right-${app.ref}">Deu</div>
      <div class="sel-check">✓</div>
      <div class="card ${cls}${isCol?' collected-card':''}" id="card-${app.ref}" data-ref="${app.ref}"
        ontouchstart="swipeStart(event,'${app.ref}');pressStart('${app.ref}')"
        ontouchmove="swipeMove(event,'${app.ref}');pressEnd('${app.ref}')"
        ontouchend="swipeEnd(event,'${app.ref}');pressEnd('${app.ref}')"
        ontouchcancel="pressEnd('${app.ref}')"
        onclick="handleTap('${app.ref}')">
        <div class="card-top">
          <div class="name" onclick="${nameClick}">${app.name}</div>
          <div class="card-top-right">${stageBtn}<button class="star-btn" onclick="event.stopPropagation();toggleStar('${app.ref}')">${si}</button></div>
        </div>
        <div class="info">
          ${refSVG} ${app.ref} &nbsp;|&nbsp;
          <span class="date-link" onclick="openDateModal('${app.apply_date}','📅','apply_date',null);event.stopPropagation()">${calSVG} ${app.apply_date}</span>
          &nbsp;${daySpan}
        </div>
        <div class="bottom-row">
          <span class="status ${scls}${shouldBlink?' status-blink':''}" onclick="${statusClick}">${app.status}</span>
          ${deuHTML}${printBadge}${policeHTML}${phoneHTML}
        </div>
        ${notePreview}
        ${expandToggle}
      </div>
    </div>`;
}

// ── Swipe & Press ─────────────────────────────────────────
let touchStartX={},touchStartY={},touching={};
function swipeStart(e,ref){touchStartX[ref]=e.touches[0].clientX;touchStartY[ref]=e.touches[0].clientY;touching[ref]=true;}
function swipeMove(e,ref){
  if(!touching[ref])return;
  const dx=e.touches[0].clientX-touchStartX[ref],dy=e.touches[0].clientY-touchStartY[ref];
  if(Math.abs(dx)<Math.abs(dy))return;
  e.preventDefault();
  const card=document.getElementById('card-'+ref);if(!card)return;
  card.style.transition='none';card.style.transform=`translateX(${dx}px)`;
  const hl=document.getElementById('hint-left-'+ref),hr=document.getElementById('hint-right-'+ref);
  if(dx<-30&&hl)hl.style.opacity=Math.min(1,Math.abs(dx)/80);else if(hl)hl.style.opacity=0;
  if(dx>30&&hr)hr.style.opacity=Math.min(1,dx/80);else if(hr)hr.style.opacity=0;
}
function swipeEnd(e,ref){
  if(!touching[ref])return;touching[ref]=false;
  const dx=e.changedTouches[0].clientX-touchStartX[ref];
  const card=document.getElementById('card-'+ref);
  const hl=document.getElementById('hint-left-'+ref),hr=document.getElementById('hint-right-'+ref);
  if(card){card.style.transition='transform 0.2s ease';card.style.transform='';}
  if(hl)hl.style.opacity=0;if(hr)hr.style.opacity=0;
  if(selectMode)return;
  if(dx<-80){delivered[ref]=!delivered[ref];if(delivered[ref])showDeu[ref]=false;save();render();}
  else if(dx>80){if(!delivered[ref]){showDeu[ref]=!showDeu[ref];if(showDeu[ref])editingDeu[ref]=true;save();render();if(showDeu[ref])setTimeout(()=>{const i=document.getElementById('deu-input-'+ref);if(i)i.focus();},50);}}
}
let pressTimer={};
function pressStart(ref){pressTimer[ref]=setTimeout(()=>{toggleSelect(ref);},600);}
function pressEnd(ref){clearTimeout(pressTimer[ref]);}
function handleTap(ref){if(selectMode)toggleSelect(ref);}

// ── Render ────────────────────────────────────────────────
function render(){
  const q=(document.querySelector('.search-bar').value||'').toLowerCase();
  let apps=allApps.filter(a=>{
    if(!matchesFilter(a))return false;
    if(q&&!a.name.toLowerCase().includes(q)&&!a.ref.toLowerCase().includes(q)&&!(policeTags[a.ref]||'').toLowerCase().includes(q))return false;
    return true;
  });
  const star2=apps.filter(a=>!delivered[a.ref]&&(stars[a.ref]||0)===2);
  const star1=apps.filter(a=>!delivered[a.ref]&&(stars[a.ref]||0)===1);
  const normal=apps.filter(a=>!delivered[a.ref]&&(stars[a.ref]||0)===0);
  const done=apps.filter(a=>delivered[a.ref]);
  let html='';
  if(star2.length){html+=`<div class="section-row"><div class="section-title">🔴 জরুরি</div></div>`;star2.forEach(a=>html+=cardHTML(a));}
  if(star1.length){html+=`<div class="section-row"><div class="section-title">⭐ গুরুত্বপূর্ণ</div></div>`;star1.forEach(a=>html+=cardHTML(a));}
  if(normal.length){if(star1.length||star2.length)html+=`<div class="section-row"><div class="section-title">সাধারণ</div></div>`;normal.forEach(a=>html+=cardHTML(a));}
  if(done.length){html+=`<div class="section-row"><div class="section-title">✓ Delivered</div></div>`;done.forEach(a=>html+=cardHTML(a));}
  if(!html)html='<div class="loading" style="padding:30px">কোনো ফলাফল নেই</div>';
  document.getElementById('list').innerHTML=html;
  document.getElementById('cnt-urgent').textContent=String(counts.urgent).padStart(2,'0');
  document.getElementById('cnt-important').textContent=String(counts.important).padStart(2,'0');
  const hasDraft=allApps.some(a=>(a.status||'').toLowerCase().includes('draft'));
  const draftBtn=document.getElementById('draft-btn');
  if(draftBtn){if(hasDraft&&activeFilter!=='draft')draftBtn.classList.add('draft-blink');else draftBtn.classList.remove('draft-blink');}
}

async function load(){
  try{
    await syncFromCloud();
    const r=await fetch('data.json?t='+Date.now());const d=await r.json();
    document.getElementById('updated').textContent='আপডেট: '+d.updated;
    allApps=d.applications;
    try{const ur=await fetch('userdata.json?t='+Date.now());if(ur.ok){const ud=await ur.json();printDates=ud.print_dates||{};statusHistory=ud.status_history||{};}}catch(e){}
    render();
  }catch(e){document.getElementById('list').innerHTML='<div class="loading">❌ লোড হয়নি</div>';}
}
load();
setInterval(load,30000);
</script>
