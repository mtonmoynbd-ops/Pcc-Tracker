<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCC Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a1628; color: #e2e8f0; font-family: 'Segoe UI', sans-serif; padding: 16px; }
  h1 { font-size: 18px; color: #60a5fa; margin-bottom: 4px; }
  .updated { font-size: 12px; color: #475569; margin-bottom: 16px; }
  .card { background: #0f1f3d; border: 1px solid #1e3a5f; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .name { font-weight: 700; font-size: 15px; color: #f1f5f9; margin-bottom: 6px; }
  .info { font-size: 12px; color: #64748b; margin-bottom: 4px; }
  .status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: 700; margin-top: 6px; }
  .s1 { background: #1e3a5f; color: #60a5fa; }
  .s2 { background: #1e3a5f; color: #60a5fa; }
  .s3 { background: #1e3a5f; color: #f59e0b; }
  .s4 { background: #1e3a5f; color: #f59e0b; }
  .s5 { background: #1e3a5f; color: #f59e0b; }
  .s6 { background: #1e3a5f; color: #a78bfa; }
  .s7 { background: #1e3a5f; color: #a78bfa; }
  .s8 { background: #1e3a5f; color: #34d399; }
  .s9 { background: #1e3a5f; color: #34d399; }
  .s10 { background: #1e3a5f; color: #34d399; }
  .loading { text-align: center; padding: 40px; color: #475569; }
</style>
</head>
<body>
<h1>🛡️ PCC Tracker</h1>
<div class="updated" id="updated">লোড হচ্ছে...</div>
<div id="list"><div class="loading">⏳ লোড হচ্ছে...</div></div>

<script>
async function load() {
  try {
    const r = await fetch('data.json?t=' + Date.now());
    const d = await r.json();
    document.getElementById('updated').textContent = 'আপডেট: ' + d.updated;
    const list = document.getElementById('list');
    list.innerHTML = '';
    d.applications.forEach(app => {
      const num = parseInt(app.status.split('/')[0]) || 0;
      const cls = 's' + Math.min(num, 10);
      list.innerHTML += `
        <div class="card">
          <div class="name">${app.name}</div>
          <div class="info">📄 ${app.ref} &nbsp;|&nbsp; 📅 ${app.apply_date}</div>
          <span class="status ${cls}">${app.status}</span>
        </div>`;
    });
  } catch(e) {
    document.getElementById('list').innerHTML = '<div class="loading">❌ লোড হয়নি</div>';
  }
}
load();
setInterval(load, 60000);
</script>
</body>
</html>
